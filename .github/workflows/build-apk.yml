name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Download Termux bootstrap (self-contained Linux/Node env)
        run: bash android/scripts/download-bootstrap.sh

      - name: Build debug APK (CodexMobile = App Store "AnyClaw")
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log --pretty=format:"- %s" --reverse -10)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            AnyClaw — OpenClaw + Codex on Android (self-contained debug build).

            ### Changes
            ${{ steps.changelog.outputs.notes }}

            ---
            Branch: ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/anyclaw.apk
          draft: false
          prerelease: true
