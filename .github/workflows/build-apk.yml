name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Download Termux bootstrap (self-contained Linux/Node env)
        run: bash android/scripts/download-bootstrap.sh

      - name: Package Freebuff assets
        run: |
          # Ensure Freebuff assets are in the APK assets directory
          FREEBUFF_SRC="android/app/src/main/assets/freebuff"
          if [ -d "$FREEBUFF_SRC" ]; then
            echo "Freebuff assets already present"
            ls -la "$FREEBUFF_SRC/"
          else
            echo "ERROR: Freebuff assets not found at $FREEBUFF_SRC"
            exit 1
          fi

      - name: Package Codebuff agent definitions
        run: |
          CODEBUFF_SRC="android/app/src/main/assets/codebuff"
          if [ -d "$CODEBUFF_SRC" ]; then
            echo "Codebuff agents present"
            ls -la "$CODEBUFF_SRC/"
          fi

      - name: Verify web UI includes Freebuff extension
        run: |
          WEB_INDEX="android/app/src/main/assets/web/index.html"
          if grep -q "codebuff-ui.js" "$WEB_INDEX"; then
            echo "Freebuff UI extension included in web UI"
          else
            echo "WARNING: codebuff-ui.js not referenced in index.html"
          fi

      - name: Build debug APK (AnyClaw with Freebuff)
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: android/app/build/outputs/apk/debug/anyclaw.apk

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log --pretty=format:"- %s" --reverse -10)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} — Freebuff Unlocked"
          body: |
            AnyClaw — OpenClaw + Codex on Android with Freebuff AI (self-contained debug build).

            ### Freebuff Features (Phase 3)
            - 🆓 **Fully Unlocked** — No paywall, no subscription, no rate limits
            - 🧠 **Free AI Models** — GPT-5 Nano, GPT-5 Mini, Claude Sonnet 4
            - 💻 **Code Editor** — Generate, edit, and refactor code
            - ⚡ **Terminal** — Execute shell commands
            - 📁 **File Explorer** — Browse and search project files
            - 🔍 **Code Review** — Analyze code quality and security
            - 🔬 **Research** — Documentation and information gathering
            - 🌐 **Hermes Web UI** — Fully unlocked with no restrictions

            ### Changes
            ${{ steps.changelog.outputs.notes }}

            ---
            Branch: ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/anyclaw.apk
          draft: false
          prerelease: true
