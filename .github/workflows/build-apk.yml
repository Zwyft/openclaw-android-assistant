name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Download Termux bootstrap (self-contained Linux/Node env)
        run: bash android/scripts/download-bootstrap.sh

      - name: Verify Freebuff assets
        run: |
          echo "=== Freebuff Integration Check ==="
          FREEBUFF_DIR="android/app/src/main/assets/freebuff"
          if [ -d "$FREEBUFF_DIR" ]; then
            echo "✓ Freebuff directory exists"
            ls -la "$FREEBUFF_DIR/"
          else
            echo "✗ Freebuff directory missing"
            exit 1
          fi
          
          echo ""
          echo "=== Codebuff Agents Check ==="
          CODEBUFF_DIR="android/app/src/main/assets/codebuff"
          if [ -d "$CODEBUFF_DIR" ]; then
            echo "✓ Codebuff agents present"
            ls "$CODEBUFF_DIR/" | head -10
          fi
          
          echo ""
          echo "=== Web UI Check ==="
          if grep -q "codebuff-ui.js" android/app/src/main/assets/web/index.html; then
            echo "✓ Freebuff UI extension included"
          fi

      - name: Build debug APK (AnyClaw with Freebuff)
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Verify APK output
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✓ APK built successfully"
            ls -lh "$APK_PATH"
            cp "$APK_PATH" android/app/build/outputs/apk/debug/anyclaw.apk
          else
            echo "✗ APK build failed"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: android/app/build/outputs/apk/debug/anyclaw.apk
          retention-days: 30

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log --pretty=format:"- %s" --reverse -10)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine release type
        id: release_type
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', github.run_number) }}
          name: "AnyClaw v${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.run_number }} — Freebuff Unlocked"
          body: |
            ## AnyClaw Android Assistant
            
            AI-powered coding assistant with **Freebuff** integration — fully unlocked, no paywall.
            
            ### Features
            - 🆓 **Freebuff AI** — Unlimited sessions, no subscription
            - 🧠 **Free Models** — GPT-5 Nano, GPT-5 Mini, Claude Sonnet 4
            - 💻 **5 AI Agents** — Editor, Terminal, Files, Review, Research
            - 🌐 **Hermes UI** — Fully unlocked web interface
            - 🔐 **OAuth Login** — Automatic redirect handling
            
            ### Changes in This Build
            ${{ steps.changelog.outputs.notes }}
            
            ### Installation
            1. Download the `anyclaw` artifact below
            2. Install on Android device (enable "Install from unknown sources")
            3. Open app and complete OAuth login
            4. Start using AI coding agents
            
            ### Technical Details
            - **APK Size**: ~36 MB
            - **First Run**: Downloads ~500 MB environment
            - **Total Storage**: ~2 GB required
            - **Android Version**: 8.0+ recommended
            
            ---
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Build: ${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/anyclaw.apk
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          generate_release_notes: false
