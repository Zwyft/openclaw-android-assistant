name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Make gradlew executable
        working-directory: apps/android
        run: chmod +x ./gradlew

      - name: Build debug APK (thirdParty flavor)
        working-directory: apps/android
        run: ./gradlew assembleThirdPartyDebug --no-daemon

      - name: Rename APK
        run: cp apps/android/app/build/outputs/apk/thirdParty/debug/app-thirdParty-debug.apk apps/android/app/build/outputs/apk/thirdParty/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw-debug
          path: apps/android/app/build/outputs/apk/thirdParty/debug/anyclaw.apk
          if-no-files-found: error
