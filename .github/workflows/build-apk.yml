name: Build APK

on:
  push:
    branches: [ main, webui, apk-build ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_DIR: apps/android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        working-directory: ${{ env.ANDROID_DIR }}
        run: chmod +x ./gradlew

      - name: Build debug APK (thirdParty)
        working-directory: ${{ env.ANDROID_DIR }}
        run: ./gradlew assembleThirdPartyDebug --no-daemon

      - name: Rename APK
        run: |
          cp apps/android/app/build/outputs/apk/thirdParty/debug/app-thirdParty-debug.apk \
             apps/android/app/build/outputs/apk/thirdParty/debug/anyclaw.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyclaw
          path: apps/android/app/build/outputs/apk/thirdParty/debug/anyclaw.apk

      - name: Generate changelog
        if: github.ref_type == 'branch'
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --reverse)
          else
            CHANGES=$(git log --pretty=format:"- %s" --reverse -20)
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.ref_type == 'branch' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "AnyClaw v${{ github.run_number }} (${{ github.ref_name }})"
          body: |
            🦞 **AnyClaw** — OpenClaw + Codex on Android

            📱 Install the APK on any ARM64 Android 7.0+ device. No root required.

            ### Changes
            ${{ steps.changelog.outputs.notes }}

            ---
            Branch: ${{ github.ref_name }}
            Built from commit ${{ github.sha }}
          files: apps/android/app/build/outputs/apk/thirdParty/debug/anyclaw.apk
          draft: false
          prerelease: false
