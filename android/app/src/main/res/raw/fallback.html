<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AnyClaw</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #020617; color: #e2e8f0; margin: 0; padding: 24px; }
    .card { background: #1e1b4b; border-radius: 12px; padding: 24px; max-width: 480px; margin: 40px auto; }
    h1 { color: #818cf8; margin-top: 0; }
    .ok { color: #22c55e; }
    .warn { color: #f59e0b; }
    button { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 12px 20px; font-size: 14px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AnyClaw</h1>
    <p class="ok">✓ Environment is ready</p>
    <p class="warn">⚠ The full Codex web UI could not be loaded. Open Settings to install or configure providers.</p>
    <p>Use the settings button (⚙️) in the top-right corner to add API keys or reinstall the environment.</p>
  </div>
</body>
</html>
